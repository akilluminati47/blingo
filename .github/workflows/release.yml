name: Release

# Every push to main (website deploy included) bumps the patch version by 0.0.1,
# builds the Windows desktop app, and replaces the GitHub Release at the new tag.
on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # the version-bump commit this workflow pushes must not retrigger itself
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Bump version and tag
        id: bump
        shell: pwsh
        run: |
          # decimal rollover: 0.0.9 -> 0.1.0, 0.9.9 -> 1.0.0 (no double digits per segment)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          $p = (node -p "require('./package.json').version").Split('.')
          $major = [int]$p[0]; $minor = [int]$p[1]; $patch = [int]$p[2]
          $patch++
          if ($patch -gt 9) { $patch = 0; $minor++
            if ($minor -gt 9) { $minor = 0; $major++ } }
          $v = "$major.$minor.$patch"
          npm version $v --no-git-tag-version --allow-same-version
          git add package.json package-lock.json
          git commit -m "Release v$v [skip ci]"
          git tag "v$v"
          git push origin main --follow-tags
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app
        run: npx electron-builder --win --publish never

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: BLINGO v${{ steps.bump.outputs.version }}
          make_latest: true
          body: |
            Standalone Windows build of **BLINGO** v${{ steps.bump.outputs.version }}.

            - **BLINGO Setup ${{ steps.bump.outputs.version }}.exe** — installer (recommended)
            - **BLINGO-${{ steps.bump.outputs.version }}-portable.exe** — no-install single file

            Play instantly in the browser instead: https://blingo.pages.dev
          files: |
            dist/*.exe
            dist/*.blockmap
